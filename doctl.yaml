alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
  - rule: BUILD_FAILED

databases:
  - cluster_name: domnak-db
    database_name: domnak_production
    engine: PG
    version: "16"
    production: true

jobs:
  - github:
      branch: main
      deploy_on_push: true
      repo: your-username/domnak-backend
    kind: POST_DEPLOY
    name: post-deploy
    run_command: python scripts/make_admin.py admin@domnak.com 'SecurePass123' 'Admin Domnak'
    environment_slug: python
    dockerfile_path: Dockerfile

name: domnak-api

region: sgp

routes:
  - path: /

services:
  - dockerfile_path: Dockerfile
    envs:
      - key: ENVIRONMENT
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://your-frontend-domain.com
    github:
      branch: main
      deploy_on_push: true
      repo: your-username/domnak-backend
    health_check:
      failure_threshold: 3
      interval_seconds: 10
      path: /health
      success_threshold: 1
      timeout_seconds: 5
    http_port: 8000
    instance_count: 1
    instance_size_slug: professional-xs
    name: domnak-api
    routes:
      - path: /

workers:
  - dockerfile_path: Dockerfile
    kind: BACKGROUND
    name: worker
    run_command: python -c "print('Worker placeholder')"
    environment_slug: python
